name: Deploy Next.js App to VPS

on:
  push:
    branches:
      - main  # Agar aapki main branch ka naam 'master' ha, to yahan 'master' kar dein

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 11092
          script: |
            set -e
            # Project directory me jayein
            cd /www/wwwroot/cgpluxstudios.com

            # Git dubious ownership error fix karein
            git config --global --add safe.directory /www/wwwroot/cgpluxstudios.com

            # Local changes (jese package-lock.json) ko discard karein taake pull fail na ho
            git reset --hard
            git pull origin main

            # Node modules install karein aur production build banayein
            npm install
            npm run build

            # PM2 process aur port conflicts resolve karein
            pm2 delete cgplux-frontend || true
            npx kill-port 3000 || true

            # Next.js server ko directly PM2 se start karein (npm ke baghair taake orphan process na bane)
            pm2 start node_modules/next/dist/bin/next --name "cgplux-frontend" -- start -p 3000
            pm2 save